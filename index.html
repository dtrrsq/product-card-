<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="styles/style.css">
  <title>Document</title>
</head>

<body>
  <div class="product-card-container">
    <h1 class="product-card-container__title">Выбери свой продукт</h1>
    <img src="images/bg-dandelions.png" alt="одуванчики" class="product-card__bg-dandelions">
    <div class="buttons">
      <button id="recolor-first-card-button">перекрасить первую карточку</button>
      <button id="recolor-all-cards-button">перекрасить все карточки</button>
      <button id="open-google-button">переход на страницу Google</button>
      <button id="color-toggler-button">переключатель цвета</button>
    </div>
    <ul id="products-list"></ul>
    <template id="product-card-template">
      <li class="product-card">
        <img class="product-card__image">
        <P class="product-card__for-skin"></P>
        <h3 class="product-card__title"></h3>
        <p class="product-card__descr"></p>
        <span class="product-card__composition">Состав:</span>
        <ul class="product-card__comp-list">
        </ul>
        <div class="product-card__price-container">
          <span class="product-card__price-text">Цена</span>
          <span class="product-card__price"></span>
        </div>
      </li>
    </template>
  </div>
  <script src="/scriipt.js"> </script>
  <script src="/homework-5.js"> </script>
  <script src="/homework-6.js"> </script>
  <script src="/homework-7.js" type="module"> </script>
  <script src="/homework-8.js" type="module"> </script>
</body>

</html>
